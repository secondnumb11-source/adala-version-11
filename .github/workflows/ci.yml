name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: TypeScript check
        run: bunx tsgo --noEmit
      - name: Build (production)
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

  e2e:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build production preview
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Start preview server
        run: |
          bun run preview --port 8080 --host 127.0.0.1 &
          echo $! > .preview.pid
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:8080 >/dev/null; then echo "preview up"; exit 0; fi
            sleep 1
          done
          echo "preview failed to start" >&2; exit 1
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: Run Playwright (RLS, cron, ai-chat regression)
        run: bunx playwright test
        env:
          E2E_URL: http://127.0.0.1:8080
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      - name: Stop preview server
        if: always()
        run: kill "$(cat .preview.pid)" 2>/dev/null || true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
